<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraderNova</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080f1e; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; color: #f1f5f9; }
    #root { display: flex; height: 100vh; overflow: hidden; }
    select, input, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0d1526; } ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  const e = React.createElement;
  const { useState, useEffect, useRef, useCallback } = React;

  // ── Config ──────────────────────────────────────────────────────────────
  const APP_ID        = "1089"; // ⚠️ Replace with your own app_id from api.deriv.com when ready — 1089 is the public test ID
  const PUBLIC_WS_URL = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;
  const AUTH_URL      = "https://auth.deriv.com/oauth2/auth";

  // ⚠️ Replace with your actual registered client_id from developers.deriv.com
  const OAUTH_CLIENT_ID    = "33B0MY3PLWPg4vDGcGwIG";
  const OAUTH_REDIRECT_URI = window.location.origin + window.location.pathname;

  function fmt(n, d=5) { return n == null ? "—" : Number(n).toFixed(d); }
  function fmtMoney(n) { return n == null ? "—" : Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }

  // ── PKCE helpers ────────────────────────────────────────────────────────
  function randomString(len) {
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    const arr = crypto.getRandomValues(new Uint8Array(len));
    return Array.from(arr).map(v => charset[v % charset.length]).join("");
  }

  async function deriveChallenge(verifier) {
    const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
    return btoa(String.fromCharCode(...new Uint8Array(hash)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  async function redirectToOAuth() {
    const codeVerifier = randomString(64);
    const state = randomString(32);
    const codeChallenge = await deriveChallenge(codeVerifier);

    sessionStorage.setItem("pkce_code_verifier", codeVerifier);
    sessionStorage.setItem("oauth_state", state);

    const params = new URLSearchParams({
      response_type: "code",
      client_id: OAUTH_CLIENT_ID,
      redirect_uri: OAUTH_REDIRECT_URI,
      scope: "trade account_manage",
      state,
      code_challenge: codeChallenge,
      code_challenge_method: "S256",
    });
    window.location.href = `${AUTH_URL}?${params}`;
  }

  function getCallbackParams() {
    const p = new URLSearchParams(window.location.search);
    return { code: p.get("code"), state: p.get("state"), error: p.get("error") };
  }

  // Backend calls (token exchange + OTP happen server-side via /api/*)
  async function exchangeCodeViaBackend(code, codeVerifier) {
    const res = await fetch("/api/token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        code,
        code_verifier: codeVerifier,
        redirect_uri: OAUTH_REDIRECT_URI,
        client_id: OAUTH_CLIENT_ID,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Token exchange failed");
    return data; // { access_token, expires_in, token_type }
  }

  async function getAccountId(accessToken) {
    const headers = {
      "Authorization": `Bearer ${accessToken}`,
      "Deriv-App-ID": APP_ID,
    };

    // 1. Try to list existing accounts
    const listRes = await fetch("https://api.derivws.com/trading/v1/options/accounts", {
      method: "GET",
      headers,
    });
    const listJson = await listRes.json();
    if (!listRes.ok) throw new Error((listJson.errors && listJson.errors[0]?.message) || "Failed to fetch accounts");

    let accounts = Array.isArray(listJson.data) ? listJson.data : (listJson.data ? [listJson.data] : []);

    // 2. If no accounts exist yet, create a demo account
    if (!accounts.length) {
      const createRes = await fetch("https://api.derivws.com/trading/v1/options/accounts", {
        method: "POST",
        headers: { ...headers, "Content-Type": "application/json" },
        body: JSON.stringify({ currency: "USD", group: "row", account_type: "demo" }),
      });
      const createJson = await createRes.json();
      if (!createRes.ok) throw new Error((createJson.errors && createJson.errors[0]?.message) || "Failed to create demo account");
      accounts = Array.isArray(createJson.data) ? createJson.data : (createJson.data ? [createJson.data] : []);
    }

    if (!accounts.length) throw new Error("No trading accounts found on this profile");
    const demo = accounts.find(a => a.account_type === "demo") || accounts[0];
    return demo.account_id;
  }

  async function fetchOTPViaBackend(accountId, accessToken) {
    const res = await fetch("/api/otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ account_id: accountId, access_token: accessToken, app_id: APP_ID }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "OTP fetch failed");
    return { ws_url: data.data?.url || data.url || data.ws_url };
  }

  // ── WebSocket hook ──────────────────────────────────────────────────────
  function useWS(url, cbs) {
    const wsRef = useRef(null);
    const cbRef = useRef(cbs);
    useEffect(() => { cbRef.current = cbs; });
    const connect = useCallback((wsUrl) => {
      if (wsRef.current) wsRef.current.close();
      const ws = new WebSocket(wsUrl || url);
      wsRef.current = ws;
      ws.onopen    = ev => cbRef.current.onOpen?.(ev);
      ws.onclose   = ev => cbRef.current.onClose?.(ev);
      ws.onerror   = ev => cbRef.current.onError?.(ev);
      ws.onmessage = ev => { try { cbRef.current.onMessage?.(JSON.parse(ev.data)); } catch{} };
    }, [url]);
    const send = useCallback((data) => { if (wsRef.current?.readyState === 1) wsRef.current.send(JSON.stringify(data)); }, []);
    useEffect(() => () => wsRef.current?.close(), []);
    return { connect, send };
  }

  function Sparkline({ ticks, color }) {
    if (!ticks || ticks.length < 2) return e("div", { style:{height:32} });
    const min = Math.min(...ticks), max = Math.max(...ticks), range = max - min || 1;
    const W = 120, H = 32;
    const pts = ticks.map((v,i) => `${(i/(ticks.length-1))*W},${H-((v-min)/range)*H}`).join(" ");
    return e("svg", { width:W, height:H, viewBox:`0 0 ${W} ${H}`, style:{display:"block"} },
      e("polyline", { points:pts, fill:"none", stroke:color||"#22d3ee", strokeWidth:"1.5", strokeLinejoin:"round" })
    );
  }

  function App() {
    const [authState, setAuthState] = useState("idle"); // idle|loading|authed|error
    const [authError, setAuthError] = useState(null);
    const [symbols, setSymbols]     = useState([]);
    const [selSym, setSelSym]       = useState(null);
    const [contracts, setContracts] = useState([]);
    const [selCon, setSelCon]       = useState(null);
    const [ticks, setTicks]         = useState({});
    const [pubStatus, setPubStatus] = useState("disconnected");
    const [stake, setStake]         = useState("10");
    const [dur, setDur]             = useState("5");
    const [durUnit, setDurUnit]     = useState("t");
    const [proposal, setProposal]   = useState(null);
    const [propLoading, setPropLoading] = useState(false);
    const [buyResult, setBuyResult] = useState(null);
    const [buyLoading, setBuyLoading] = useState(false);
    const [balance, setBalance]     = useState(null);
    const [portfolio, setPortfolio] = useState([]);
    const [tab, setTab]             = useState("market");
    const [toast, setToast]         = useState(null);
    const propIdRef = useRef(null);
    const pendingBuyRef = useRef(false);

    // Scanner state
    const [scanSym, setScanSym]       = useState(null);
    const [scanTicks, setScanTicks]   = useState([]); // array of last digits
    const [scanCount, setScanCount]   = useState(1000);
    const [scanRunning, setScanRunning] = useState(false);
    const scanSymRef = useRef(null);
    const scanCountRef = useRef(1000);
    useEffect(() => { scanSymRef.current = scanRunning ? scanSym : null; }, [scanSym, scanRunning]);
    useEffect(() => { scanCountRef.current = scanCount; }, [scanCount]);

    // Bulk Trader (bot) state
    const [botSym, setBotSym]           = useState(null);
    const [botType, setBotType]         = useState("evenodd"); // evenodd | overunder
    const [botPrediction, setBotPrediction] = useState("even"); // even|odd | over|under
    const [botBarrier, setBotBarrier]   = useState(5);
    const [botBaseStake, setBotBaseStake] = useState("1");
    const [botMultiplier, setBotMultiplier] = useState("2");
    const [botTakeProfit, setBotTakeProfit] = useState("10");
    const [botStopLoss, setBotStopLoss] = useState("10");
    const [botMaxStake, setBotMaxStake] = useState("20");
    const [botRunning, setBotRunning]   = useState(false);
    const [botConfirming, setBotConfirming] = useState(false);
    const [botPL, setBotPL]             = useState(0);
    const [botStake, setBotStake]       = useState(1);
    const [botTrades, setBotTrades]     = useState([]); // {time, stake, result, profit, contractId}
    const [botStatus, setBotStatus]     = useState("idle"); // idle | waiting_proposal | in_trade
    const botRunningRef = useRef(false);
    const botStateRef   = useRef({}); // holds latest bot config + running totals for closures
    useEffect(() => { botRunningRef.current = botRunning; }, [botRunning]);
    useEffect(() => {
      botStateRef.current = {
        sym: botSym, type: botType, prediction: botPrediction, barrier: botBarrier,
        baseStake: parseFloat(botBaseStake) || 1, multiplier: parseFloat(botMultiplier) || 2,
        takeProfit: parseFloat(botTakeProfit) || 10, stopLoss: parseFloat(botStopLoss) || 10,
        maxStake: parseFloat(botMaxStake) || 20,
        pl: botPL, stake: botStake,
      };
    }, [botSym, botType, botPrediction, botBarrier, botBaseStake, botMultiplier, botTakeProfit, botStopLoss, botMaxStake, botPL, botStake]);

    const pubWs = useWS(PUBLIC_WS_URL, {
      onOpen: () => { setPubStatus("connected"); pubWs.send({ active_symbols:"brief", product_type:"basic" }); },
      onClose: () => {
        setPubStatus("disconnected");
        setTimeout(() => pubWs.connect(), 2000); // auto-reconnect
      },
      onError: () => setPubStatus("error"),
      onMessage: (msg) => {
        if (msg.error) console.warn("public WS error:", msg);
        if (msg.msg_type === "active_symbols") {
          const syms = (msg.active_symbols||[]).filter(s=>!s.is_trading_suspended);
          setSymbols(syms);
          setSelSym(prev => prev || (syms[0]?.symbol ?? null));
        }
        if (msg.msg_type === "contracts_for") {
          console.log("contracts_for msg:", msg);
          const list = msg.contracts_for?.available || [];
          setContracts(list);
          setSelCon(prev => prev || (list[0] ?? null));
        }
        if (msg.msg_type === "tick") {
          const { symbol, quote } = msg.tick || {};
          if (symbol && quote) {
            setTicks(prev => ({ ...prev, [symbol]: [...(prev[symbol]||[]), quote].slice(-60) }));
            if (symbol === scanSymRef.current) {
              const lastDigit = Number(String(quote).replace(".", "").slice(-1));
              setScanTicks(prev => [...prev, lastDigit].slice(-scanCountRef.current));
            }
          }
        }
      }
    });

    const authWs = useWS(null, {
      onOpen: () => { authWs.send({ balance:1, subscribe:1 }); authWs.send({ portfolio:1 }); },
      onMessage: (msg) => {
        if (msg.msg_type === "balance")   { console.log("balance msg:", msg); setBalance(msg.balance); }
        if (msg.msg_type === "portfolio") { console.log("portfolio msg:", msg); setPortfolio(msg.portfolio?.contracts || []); }

        // ── Bot-originated proposal (req_id 9001) ──
        if (msg.msg_type === "proposal" && msg.req_id === 9001) {
          if (msg.error) {
            showToast("Bot quote failed: " + msg.error.message, false);
            setBotStatus("idle");
          } else {
            authWs.send({ buy: msg.proposal.id, price: parseFloat(msg.proposal.ask_price), req_id: 9002 });
          }
          return;
        }
        // ── Bot-originated buy (req_id 9002) ──
        if (msg.msg_type === "buy" && msg.req_id === 9002) {
          if (msg.error) {
            showToast("Bot trade failed: " + msg.error.message, false);
            setBotStatus("idle");
          } else {
            setBotStatus("in_trade");
            authWs.send({ proposal_open_contract: 1, contract_id: msg.buy.contract_id, subscribe: 1, req_id: 9003 });
          }
          return;
        }
        // ── Bot contract settlement tracking (req_id 9003) ──
        if (msg.msg_type === "proposal_open_contract" && msg.req_id === 9003) {
          const c = msg.proposal_open_contract;
          if (c && c.is_sold) {
            const profit = parseFloat(c.profit);
            const won = profit > 0;
            const st = botStateRef.current;
            const newPL = st.pl + profit;
            setBotPL(newPL);
            setBotTrades(prev => [{ time: Date.now(), stake: st.stake, won, profit, contractId: c.contract_id }, ...prev].slice(0, 50));
            setAuthBalanceRefresh();
            // Martingale: increase stake on loss, reset on win
            const rawNextStake = won ? st.baseStake : +(st.stake * st.multiplier).toFixed(2);
            const nextStake = Math.min(rawNextStake, st.maxStake);
            setBotStake(nextStake);
            // Check stop conditions
            if (newPL >= st.takeProfit) {
              showToast(`🎯 Take-profit hit! +$${newPL.toFixed(2)}`, true);
              setBotRunning(false); setBotStatus("idle");
            } else if (newPL <= -st.stopLoss) {
              showToast(`🛑 Stop-loss hit. ${newPL.toFixed(2)}`, false);
              setBotRunning(false); setBotStatus("idle");
            } else if (!won && rawNextStake > st.maxStake) {
              showToast(`⚠️ Max stake ($${st.maxStake.toFixed(2)}) reached — bot stopped for safety.`, false);
              setBotRunning(false); setBotStatus("idle");
            } else if (botRunningRef.current) {
              setBotStatus("idle"); // ready for next round; effect below will trigger it
            } else {
              setBotStatus("idle");
            }
          }
          return;
        }

        // ── Manual (Trade tab) flows ──
        if (msg.msg_type === "proposal" && msg.req_id !== 9001)  {
          console.log("proposal msg:", msg);
          if (msg.error) {
            showToast("Quote failed: " + msg.error.message, false);
            setPropLoading(false);
            setBuyLoading(false);
            pendingBuyRef.current = false;
          } else {
            setProposal(msg.proposal); propIdRef.current = msg.proposal?.id; setPropLoading(false);
            if (pendingBuyRef.current) {
              pendingBuyRef.current = false;
              authWs.send({ buy: msg.proposal.id, price: parseFloat(msg.proposal.ask_price) });
            }
          }
        }
        if (msg.msg_type === "buy" && msg.req_id !== 9002)       { setBuyResult(msg.buy); setBuyLoading(false); showToast(msg.error ? "Buy failed: "+msg.error.message : "✓ Contract #"+msg.buy?.contract_id+" purchased", !msg.error); authWs.send({portfolio:1}); }

        if (msg.error && msg.msg_type !== "buy" && msg.msg_type !== "proposal" && msg.msg_type !== "proposal_open_contract") { showToast("Error: "+msg.error.message, false); setPropLoading(false); setBuyLoading(false); }
      }
    });

    function setAuthBalanceRefresh() { authWs.send({ portfolio: 1 }); }

    // Bot round trigger — fires next trade when idle & running
    useEffect(() => {
      if (!botRunning || botStatus !== "idle") return;
      const st = botStateRef.current;
      if (!st.sym) { showToast("Bot: select a market first", false); setBotRunning(false); return; }
      const contract_type = st.type === "evenodd"
        ? (st.prediction === "even" ? "DIGITEVEN" : "DIGITODD")
        : (st.prediction === "over" ? "DIGITOVER" : "DIGITUNDER");
      const req = {
        proposal: 1, amount: st.stake, basis: "stake",
        contract_type, currency: "USD", duration: 1, duration_unit: "t",
        underlying_symbol: st.sym, req_id: 9001,
      };
      if (st.type === "overunder") req.barrier = String(st.barrier);
      setBotStatus("waiting_proposal");
      authWs.send(req);
    }, [botRunning, botStatus]);

    // Connect to public market data on load
    useEffect(() => { pubWs.connect(); }, []);

    // Handle OAuth callback
    useEffect(() => {
      const { code, state, error } = getCallbackParams();
      if (error) { setAuthState("error"); setAuthError(error); return; }
      if (!code) return;

      const storedState = sessionStorage.getItem("oauth_state");
      const codeVerifier = sessionStorage.getItem("pkce_code_verifier");

      window.history.replaceState({}, "", window.location.pathname);

      if (!storedState || state !== storedState) {
        setAuthState("error"); setAuthError("State mismatch — please try logging in again.");
        return;
      }
      if (!codeVerifier) {
        setAuthState("error"); setAuthError("Missing code verifier — please try logging in again.");
        return;
      }

      setAuthState("loading");
      exchangeCodeViaBackend(code, codeVerifier)
        .then(async (tokenData) => {
          sessionStorage.removeItem("pkce_code_verifier");
          sessionStorage.removeItem("oauth_state");
          const accountId = await getAccountId(tokenData.access_token);
          const otp = await fetchOTPViaBackend(accountId, tokenData.access_token);
          setAuthState("authed");
          return otp.ws_url;
        })
        .then(wsUrl => authWs.connect(wsUrl))
        .catch(err => { setAuthState("error"); setAuthError(err.message); });
    }, []);

    // Subscribe to ticks + contracts when symbol changes
    useEffect(() => {
      if (!selSym || pubStatus !== "connected") return;
      setContracts([]); setSelCon(null);
      pubWs.send({ ticks: selSym, subscribe:1 });
      pubWs.send({ contracts_for: selSym, product_type:"basic" });
    }, [selSym, pubStatus]);

    function showToast(msg, ok=true) { setToast({msg,ok}); setTimeout(()=>setToast(null),4000); }

    function startScan(sym) {
      setScanSym(sym);
      setScanTicks([]);
      setScanRunning(true);
      if (pubStatus === "connected") pubWs.send({ ticks: sym, subscribe: 1 });
    }
    function stopScan() {
      setScanRunning(false);
    }

    function requestStartBot() {
      if (!botSym) { showToast("Select a market for the bot first", false); return; }
      setBotConfirming(true);
    }
    function confirmStartBot() {
      setBotConfirming(false);
      setBotPL(0);
      setBotStake(parseFloat(botBaseStake) || 1);
      setBotTrades([]);
      setBotStatus("idle");
      setBotRunning(true);
    }
    function stopBot() {
      setBotRunning(false);
      setBotStatus("idle");
      showToast("Bot stopped", true);
    }

    function getQuote() {
      if (!selSym) { showToast("Please select an asset first", false); return; }
      if (!selCon) { showToast("No contract types loaded for this asset yet — try reselecting it, or check market connection", false); return; }
      setPropLoading(true); setProposal(null);
      const req = { proposal:1, amount:parseFloat(stake)||10, basis:"stake", contract_type:selCon.contract_type, currency:"USD", duration:parseInt(dur)||5, duration_unit:durUnit, underlying_symbol:selSym };
      console.log("sending proposal request:", req);
      authWs.send(req);
      setTimeout(() => {
        setPropLoading(curr => {
          if (curr) showToast("No response from server — check console for details", false);
          return false;
        });
      }, 8000);
    }

    function buyNow() {
      if (!selSym || !selCon) return;
      setBuyLoading(true);
      // Re-request a fresh proposal immediately before buying — proposal IDs are short-lived
      const req = { proposal:1, amount:parseFloat(stake)||10, basis:"stake", contract_type:selCon.contract_type, currency:"USD", duration:parseInt(dur)||5, duration_unit:durUnit, underlying_symbol:selSym };
      console.log("refreshing proposal before buy:", req);
      pendingBuyRef.current = true;
      authWs.send(req);
    }

    const symTicks   = selSym ? (ticks[selSym]||[]) : [];
    const curTick    = symTicks.slice(-1)[0] ?? null;
    const prevTick   = symTicks.length > 1 ? symTicks.slice(-2)[0] : null;
    const tickUp     = curTick != null && prevTick != null && curTick > prevTick;
    const tickDown   = curTick != null && prevTick != null && curTick < prevTick;

    const C = { cyan:"#22d3ee", green:"#22c55e", red:"#f87171", bg:"#080f1e", card:"#0d1526", border:"#1e293b", muted:"#64748b", sub:"#94a3b8", text:"#f1f5f9", sidebar:"#060d1a" };

    const navBtn = (key) => ({
      display:"flex", alignItems:"center", gap:12, padding:"10px 20px", border:"none",
      borderLeft: tab===key ? `2px solid ${C.cyan}` : "2px solid transparent",
      background: tab===key ? "#0f172a" : "transparent",
      color: tab===key ? C.cyan : C.sub,
      cursor:"pointer", fontSize:14, fontWeight:500, width:"100%", textAlign:"left"
    });

    const fieldStyle = { background:"#0a1628", border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"9px 12px", fontSize:14, width:"100%", outline:"none" };

    return e("div", { style:{display:"flex",height:"100vh",overflow:"hidden",background:C.bg} },

      e("aside", { style:{width:220,background:C.sidebar,borderRight:`1px solid #0f172a`,display:"flex",flexDirection:"column",padding:"24px 0 16px",flexShrink:0} },
        e("div", { style:{display:"flex",alignItems:"center",gap:10,padding:"0 20px 24px",borderBottom:"1px solid #0f172a"} },
          e("span", { style:{background:C.cyan,color:"#060d1a",fontWeight:900,fontSize:14,borderRadius:6,padding:"3px 7px"} }, "TN"),
          e("span", { style:{fontSize:16,fontWeight:700} }, "TraderNova")
        ),
        e("div", { style:{display:"flex",flexDirection:"column",gap:2,padding:"20px 0",flex:1} },
          [["market","◈","Markets"],["trade","⚡","Trade"],["scanner","◎","Scanner"],["bulk","▣","Bulk Trader"],["portfolio","▤","Portfolio"]].map(([key,icon,label]) =>
            e("button", { key, style:navBtn(key), onClick:()=>setTab(key) },
              e("span", { style:{fontSize:18,width:24} }, icon),
              e("span", null, label)
            )
          )
        ),
        e("div", { style:{padding:"16px",borderTop:"1px solid #0f172a"} },
          authState === "authed"
            ? e("div", { style:{background:"#0a1628",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"} },
                e("div", { style:{display:"flex",alignItems:"center",gap:6,marginBottom:6} },
                  e("span", { style:{width:7,height:7,borderRadius:"50%",background:C.green,display:"inline-block"} }),
                  e("span", { style:{color:C.sub,fontSize:11} }, "Demo Account")
                ),
                e("div", { style:{color:C.muted,fontSize:11,letterSpacing:1} }, "BALANCE"),
                e("div", { style:{color:C.text,fontSize:20,fontFamily:"monospace",fontWeight:700} }, "$"+fmtMoney(balance?.balance ?? balance?.amount ?? balance?.value)),
                e("div", { style:{color:C.muted,fontSize:11} }, balance?.currency||"USD")
              )
            : authState === "loading"
              ? e("div", { style:{color:C.muted,fontSize:12,textAlign:"center"} }, "Authenticating…")
              : authState === "error"

                          e("span", { style:{color:C.muted} }, new Date(t.time).toLocaleTimeString()),
                          e("span", { style:{color:C.sub} }, "$"+t.stake.toFixed(2)),
                          e("span", { style:{color:t.won?C.green:"#f87171",fontWeight:700} }, (t.won?"WON ":"LOST ")+(t.profit>=0?"+":"")+"$"+t.profit.toFixed(2))
                        ))
                  )
                )
              ),

          // ── Confirmation modal ──
          botConfirming && e("div", { style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000} },
            e("div", { style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:28,maxWidth:380} },
              e("h3", { style:{fontSize:17,fontWeight:700,marginBottom:12} }, "Confirm Bot Start"),
              e("p", { style:{color:C.sub,fontSize:13,lineHeight:1.6,marginBottom:18} },
                "This will place real trades on your demo account automatically. Base stake $"+botBaseStake+", Martingale ×"+botMultiplier+", max stake cap $"+botMaxStake+", stopping at +$"+botTakeProfit+" profit or -$"+botStopLoss+" loss."
              ),
              e("div", { style:{display:"flex",gap:10} },
                e("button", { style:{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.sub,fontSize:13,fontWeight:600,cursor:"pointer"}, onClick:()=>setBotConfirming(false) }, "Cancel"),
                e("button", { style:{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.green,color:"#052e16",fontSize:13,fontWeight:700,cursor:"pointer"}, onClick:confirmStartBot }, "Start Bot")
              )
            )
          )
        ),

        tab === "portfolio" && e("div", { style:{padding:32,maxWidth:900} },
          e("h2", { style:{fontSize:22,fontWeight:700,margin:"0 0 24px",letterSpacing:-0.5} }, "Portfolio"),
          authState !== "authed"
            ? e("div", { style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:32,textAlign:"center",maxWidth:340} },
                e("p", { style:{color:C.sub,marginBottom:12} }, "Connect your demo account to view your portfolio."),
                e("button", { style:{background:C.cyan,color:"#060d1a",border:"none",borderRadius:8,padding:"10px 14px",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%"}, onClick:redirectToOAuth }, "Connect Demo Account")
              )
            : portfolio.length === 0
              ? e("div", { style:{textAlign:"center",padding:"80px 20px",color:"#475569"} },
                  e("div", { style:{fontSize:48} }, "▤"),
                  e("p", { style:{marginTop:16} }, "No open contracts. Place a trade to get started.")
                )
              : e("div", { style:{border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"} },
                  e("div", { style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"12px 20px",background:"#0a1628",fontSize:11,fontWeight:700,color:"#475569",letterSpacing:1,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`} },
                    ["Asset","Type","Buy Price","Payout","Expiry"].map(h=>e("span",{key:h},h))
                  ),
                  portfolio.map(c =>
                    e("div", { key:c.contract_id, style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"14px 20px",fontSize:13,color:C.sub,borderBottom:`1px solid #0f172a`,alignItems:"center"} },
                      e("span", { style:{color:C.text,fontWeight:600} }, c.underlying_symbol||c.symbol),
                      e("span", null, c.contract_type),
                      e("span", { style:{fontFamily:"monospace"} }, "$"+fmtMoney(c.buy_price)),
                      e("span", { style:{color:C.green,fontFamily:"monospace"} }, "$"+fmtMoney(c.payout)),
                      e("span", { style:{fontSize:12} }, c.expiry_time ? new Date(c.expiry_time*1000).toLocaleTimeString() : "—")
                    )
                  )
                )
        )
      ),

      toast && e("div", { style:{position:"fixed",bottom:24,right:24,padding:"14px 20px",borderRadius:10,border:"1px solid",fontSize:13,fontWeight:600,maxWidth:360,zIndex:1000,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",background:toast.ok?"#052e16":"#1f0a0a",borderColor:toast.ok?C.green:C.red,color:toast.ok?C.green:C.red} }, toast.msg)
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
