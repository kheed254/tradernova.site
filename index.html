<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraderNova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08090c;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e8e6df;
      -webkit-font-smoothing: antialiased;
    }

    #root { display: flex; height: 100vh; overflow: hidden; flex-direction: column; }

    select, input, button { font-family: 'Inter', system-ui, sans-serif; }
    input[type=number], input[type=text], select { color: #e8e6df !important; -webkit-text-fill-color: #e8e6df !important; }
    input::-webkit-input-placeholder { color: #4b5563 !important; -webkit-text-fill-color: #4b5563 !important; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #13161c inset !important; -webkit-text-fill-color: #e8e6df !important; }

    /* Monospace for all numbers */
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d35; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #39ff88; }

    /* Nav tab active underline animation */
    @keyframes tabSlide { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    /* Glow pulse for live indicator */
    @keyframes glow { 0%,100% { box-shadow: 0 0 4px #39ff88; } 50% { box-shadow: 0 0 12px #39ff88, 0 0 24px #39ff8844; } }
    .live-dot { animation: glow 2s ease-in-out infinite; }

    /* Card hover lift */
    .card-hover { transition: transform 0.15s, border-color 0.15s; }
    .card-hover:hover { transform: translateY(-2px); }

    /* Subtle grid texture on bg */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(57,255,136,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,136,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Spin animation for loading */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Select/input reset */
    select { appearance: none; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
    input:focus, select:focus { outline: none; border-color: #39ff88 !important; box-shadow: 0 0 0 2px rgba(57,255,136,0.12); }
    button:focus-visible { outline: 2px solid #39ff88; outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  const e = React.createElement;
  const { useState, useEffect, useRef, useCallback } = React;

  // ── Config ──────────────────────────────────────────────────────────────
  const APP_ID        = "1089"; // ⚠️ Replace with your own app_id from api.deriv.com when ready — 1089 is the public test ID
  const PUBLIC_WS_URL = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;
  const AUTH_URL      = "https://auth.deriv.com/oauth2/auth";

  // ⚠️ Replace with your actual registered client_id from developers.deriv.com
  const OAUTH_CLIENT_ID    = "33B0MY3PLWPg4vDGcGwIG";
  const OAUTH_REDIRECT_URI = window.location.origin + window.location.pathname;

  function fmt(n, d=5) { return n == null ? "—" : Number(n).toFixed(d); }
  function fmtMoney(n) { return n == null ? "—" : Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }

  // ── PKCE helpers ────────────────────────────────────────────────────────
  function randomString(len) {
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    const arr = crypto.getRandomValues(new Uint8Array(len));
    return Array.from(arr).map(v => charset[v % charset.length]).join("");
  }

  async function deriveChallenge(verifier) {
    const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
    return btoa(String.fromCharCode(...new Uint8Array(hash)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  async function redirectToOAuth() {
    const codeVerifier = randomString(64);
    const state = randomString(32);
    const codeChallenge = await deriveChallenge(codeVerifier);

    sessionStorage.setItem("pkce_code_verifier", codeVerifier);
    sessionStorage.setItem("oauth_state", state);

    const params = new URLSearchParams({
      response_type: "code",
      client_id: OAUTH_CLIENT_ID,
      redirect_uri: OAUTH_REDIRECT_URI,
      scope: "trade account_manage",
      state,
      code_challenge: codeChallenge,
      code_challenge_method: "S256",
    });
    window.location.href = `${AUTH_URL}?${params}`;
  }

  function getCallbackParams() {
    const p = new URLSearchParams(window.location.search);
    return { code: p.get("code"), state: p.get("state"), error: p.get("error") };
  }

  // Backend calls (token exchange + OTP happen server-side via /api/*)
  async function exchangeCodeViaBackend(code, codeVerifier) {
    const res = await fetch("/api/token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        code,
        code_verifier: codeVerifier,
        redirect_uri: OAUTH_REDIRECT_URI,
        client_id: OAUTH_CLIENT_ID,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Token exchange failed");
    return data; // { access_token, expires_in, token_type }
  }

  async function getAllAccounts(accessToken) {
    const headers = {
      "Authorization": `Bearer ${accessToken}`,
      "Deriv-App-ID": APP_ID,
    };

    const listRes = await fetch("https://api.derivws.com/trading/v1/options/accounts", {
      method: "GET", headers,
    });
    const listJson = await listRes.json();
    if (!listRes.ok) throw new Error((listJson.errors && listJson.errors[0]?.message) || "Failed to fetch accounts");

    let accounts = Array.isArray(listJson.data) ? listJson.data : (listJson.data ? [listJson.data] : []);

    if (!accounts.length) {
      const createRes = await fetch("https://api.derivws.com/trading/v1/options/accounts", {
        method: "POST",
        headers: { ...headers, "Content-Type": "application/json" },
        body: JSON.stringify({ currency: "USD", group: "row", account_type: "demo" }),
      });
      const createJson = await createRes.json();
      if (!createRes.ok) throw new Error((createJson.errors && createJson.errors[0]?.message) || "Failed to create demo account");
      accounts = Array.isArray(createJson.data) ? createJson.data : (createJson.data ? [createJson.data] : []);
    }

    if (!accounts.length) throw new Error("No trading accounts found on this profile");
    return accounts; // return ALL accounts
  }

  async function fetchOTPViaBackend(accountId, accessToken) {
    const res = await fetch("/api/otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ account_id: accountId, access_token: accessToken, app_id: APP_ID }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "OTP fetch failed");
    return { ws_url: data.data?.url || data.url || data.ws_url };
  }

  // ── WebSocket hook ──────────────────────────────────────────────────────
  function useWS(url, cbs) {
    const wsRef = useRef(null);
    const cbRef = useRef(cbs);
    useEffect(() => { cbRef.current = cbs; });
    const connect = useCallback((wsUrl) => {
      if (wsRef.current) wsRef.current.close();
      const ws = new WebSocket(wsUrl || url);
      wsRef.current = ws;
      ws.onopen    = ev => cbRef.current.onOpen?.(ev);
      ws.onclose   = ev => cbRef.current.onClose?.(ev);
      ws.onerror   = ev => cbRef.current.onError?.(ev);
      ws.onmessage = ev => { try { cbRef.current.onMessage?.(JSON.parse(ev.data)); } catch{} };
    }, [url]);
    const send = useCallback((data) => { if (wsRef.current?.readyState === 1) wsRef.current.send(JSON.stringify(data)); }, []);
    useEffect(() => () => wsRef.current?.close(), []);
    const disconnect = useCallback(() => { wsRef.current?.close(); wsRef.current = null; }, []);
    return { connect, send, disconnect };
  }

  function Sparkline({ ticks, color }) {
    if (!ticks || ticks.length < 2) return e("div", { style:{height:32} });
    const min = Math.min(...ticks), max = Math.max(...ticks), range = max - min || 1;
    const W = 120, H = 32;
    const pts = ticks.map((v,i) => `${(i/(ticks.length-1))*W},${H-((v-min)/range)*H}`).join(" ");
    return e("svg", { width:W, height:H, viewBox:`0 0 ${W} ${H}`, style:{display:"block"} },
      e("polyline", { points:pts, fill:"none", stroke:color||"#39ff88", strokeWidth:"1.5", strokeLinejoin:"round" })
    );
  }

  function App() {
    const [authState, setAuthState] = useState("idle");
    const [authError, setAuthError] = useState(null);
    const [accounts, setAccounts] = useState([]); // all available accounts
    const [activeAccount, setActiveAccount] = useState(null); // currently selected account

    const [accountDropdownOpen, setAccountDropdownOpen] = useState(false);
    const [settingsOpen, setSettingsOpen] = useState(false);
    const accessTokenRef = useRef(null); // stored for account switching
    const [symbols, setSymbols]     = useState([]);
    const [selSym, setSelSym]       = useState(null);
    const [contracts, setContracts] = useState([]);
    const [selCon, setSelCon]       = useState(null);
    const [ticks, setTicks]         = useState({});
    const [pubStatus, setPubStatus] = useState("disconnected");
    const [stake, setStake]         = useState("10");
    const [digitBarrier, setDigitBarrier] = useState("5"); // for DIGITMATCH/DIGITDIFF/DIGITOVER/DIGITUNDER
    const [dur, setDur]             = useState("5");
    const [durUnit, setDurUnit]     = useState("t");
    const [proposal, setProposal]   = useState(null);
    const [propLoading, setPropLoading] = useState(false);
    const [buyResult, setBuyResult] = useState(null);
    const [buyLoading, setBuyLoading] = useState(false);
    const [balance, setBalance]     = useState(null);
    const [portfolio, setPortfolio] = useState([]);
    const [tab, setTab]             = useState("dashboard");
    const [splash, setSplash]       = useState(true);
    const [splashProgress, setSplashProgress] = useState(0);
    const [splashStep, setSplashStep] = useState(0);
    const [toast, setToast]         = useState(null);
    const propIdRef = useRef(null);
    const pendingBuyRef = useRef(false);

    // Scanner state
    const [scanSym, setScanSym]       = useState(null);
    const [scanTicks, setScanTicks]   = useState([]); // array of last digits
    const [scanPrices, setScanPrices] = useState([]); // array of raw prices (for Rise/Fall)
    const [scanCount, setScanCount]   = useState(1000);
    const [scanRunning, setScanRunning] = useState(false);
    const [scanMatchDigit, setScanMatchDigit] = useState(5);
    const [activeRobot, setActiveRobot] = useState(null);
    // ── Sound & Notification settings ─────────────────────────────────────
    const [soundEnabled, setSoundEnabled] = useState(() => {
      try { return localStorage.getItem("tn_sound") !== "off"; } catch { return true; }
    });
    const [notifEnabled, setNotifEnabled] = useState(() => {
      try { return localStorage.getItem("tn_notif") === "on"; } catch { return false; }
    });
    useEffect(() => { try { localStorage.setItem("tn_sound", soundEnabled?"on":"off"); } catch {} }, [soundEnabled]);
    useEffect(() => { try { localStorage.setItem("tn_notif", notifEnabled?"on":"off"); } catch {} }, [notifEnabled]);

    // Web Audio tone generator — no external files needed
    function playTone(freq, duration, type="sine", vol=0.3, freqEnd=null) {
      if (!soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
        osc.onended = () => ctx.close();
      } catch {}
    }

    function playWin()        { playTone(523, 0.08); setTimeout(()=>playTone(659, 0.08), 80); setTimeout(()=>playTone(784, 0.15), 160); }
    function playLoss()       { playTone(330, 0.1); setTimeout(()=>playTone(247, 0.2), 100); }
    function playTakeProfit() { [0,80,160,240].forEach((d,i)=>setTimeout(()=>playTone([523,659,784,1047][i],0.12,"sine",0.4),d)); }
    function playStopLoss()   { playTone(220, 0.15,"sawtooth",0.3,180); setTimeout(()=>playTone(165,0.3,"sawtooth",0.25,130),150); }
    function playStart()      { playTone(440, 0.06); setTimeout(()=>playTone(550, 0.1), 70); }

    function sendNotif(title, body, icon="🤖") {

      try {
        if (Notification.permission === "granted") {
          new Notification("TraderNova — "+title, { body, icon:"https://tradernova-site.vercel.app/favicon.ico" });
        } else if (Notification.permission !== "denied") {
          Notification.requestPermission().then(p => {
            if (p === "granted") new Notification("TraderNova — "+title, { body });
          });
        }
      } catch {}
    }

    const [sessionHistory, setSessionHistoryRaw] = useState(() => {
      try {
        const saved = localStorage.getItem("tn_session_history");
        return saved ? JSON.parse(saved) : [];
      } catch { return []; }
    });
    const setSessionHistory = (updater) => {
      setSessionHistoryRaw(prev => {
        const next = typeof updater === "function" ? updater(prev) : updater;
        try { localStorage.setItem("tn_session_history", JSON.stringify(next)); } catch {}
        return next;
      });
    };
    const scanSymRef = useRef(null);
    const scanTicksRef = useRef([]);
    const ticksRef = useRef({});
    const scanPricesRef = useRef([]);
    useEffect(() => { scanTicksRef.current = scanTicks; }, [scanTicks]);
    useEffect(() => { ticksRef.current = ticks; }, [ticks]);
    useEffect(() => { scanPricesRef.current = scanPrices; }, [scanPrices]);
    const scanCountRef = useRef(1000);
    useEffect(() => { scanSymRef.current = scanRunning ? scanSym : null; }, [scanSym, scanRunning]);
    useEffect(() => { scanCountRef.current = scanCount; }, [scanCount]);

    // Bulk Trader (bot) state
    const [botSym, setBotSym]           = useState(null);
    const [botType, setBotType]         = useState("evenodd"); // evenodd | overunder
    const [botPrediction, setBotPrediction] = useState("even"); // even|odd | over|under

    const [botTakeProfit, setBotTakeProfit] = useState("10");
    const [botStopLoss, setBotStopLoss] = useState("10");
    const [botMaxStake, setBotMaxStake] = useState("20");

    // Nova AI state

    // Nova Rotator state
    const [rotStep, setRotStep] = useState(0);

    useEffect(() => { rotMarketBRef.current = rotMarketB; }, [rotMarketB]);

    const smartConsecLossesRef = useRef(0);
    const smartPauseRoundsRef  = useRef(0);
    const smartSwitcherPredRef = useRef("even");

    useEffect(() => { smartPauseRoundsRef.current = smartPauseRounds; }, [smartPauseRounds]);
    useEffect(() => { smartSwitcherPredRef.current = smartSwitcherPred; }, [smartSwitcherPred]);
    useEffect(() => { smartSwitcherLossesRef.current = smartSwitcherLosses; }, [smartSwitcherLosses]);

    // Speedbot state — multiple independent mini-bots running concurrently
    const SPEEDBOT_TYPES = [
      { id:"eo_digits", title:"Even/Odd (Digits)", stat:"evenodd", mode:"digits" },
      { id:"eo_pct",    title:"Even/Odd (Percentage)", stat:"evenodd", mode:"percent" },

    const [speedbots, setSpeedbots] = useState(() => SPEEDBOT_TYPES.map(t => ({

    const speedbotPropIdRef = useRef({}); // botId -> last proposal id awaited

    // Risk Calculator state
    const [rcBaseStake, setRcBaseStake]   = useState("1");

    // Charts state
    // Signals state

    const chartIntervalRef = useRef(5);
    const currentCandleRef = useRef(null);
    useEffect(() => { chartSymRef.current = chartSym; }, [chartSym]);
    useEffect(() => { chartIntervalRef.current = chartInterval; }, [chartInterval]);
    useEffect(() => {
      if (chartSym) { setCandles([]); currentCandleRef.current = null; }
    }, [chartInterval]);
    const [botRunning, setBotRunning]   = useState(false);
    const [botConfirming, setBotConfirming] = useState(false);
    const [botPL, setBotPL]             = useState(0);
    const [botStake, setBotStake]       = useState(1);
    const [botTrades, setBotTrades]     = useState([]); // {time, stake, result, profit, contractId}
    const botTradesRef = useRef([]);
    useEffect(() => { botTradesRef.current = botTrades; }, [botTrades]);
    const [botStatus, setBotStatus]     = useState("idle"); // idle | waiting_proposal | in_trade
    const [botTick, setBotTick]         = useState(0); // increments to force round trigger re-run
    const botRunningRef = useRef(false);
    const botStateRef   = useRef({}); // holds latest bot config + running totals for closures
    const currentPredictionRef = useRef("even"); // tracks active prediction across a session (for recovery switching)
    useEffect(() => { botRunningRef.current = botRunning; }, [botRunning]);
    useEffect(() => {
      botStateRef.current = {
        sym: botSym, type: botType, prediction: botPrediction, barrier: botBarrier,
        recoveryPrediction: botRecoveryPrediction, useMartingale: botUseMartingale,
        baseStake: parseFloat(botBaseStake) || 1, multiplier: parseFloat(botMultiplier) || 2,
        takeProfit: parseFloat(botTakeProfit) || 10, stopLoss: parseFloat(botStopLoss) || 10,
        maxStake: parseFloat(botMaxStake) || 20,
        pl: botPL, stake: botStake,
      };
    }, [botSym, botType, botPrediction, botBarrier, botRecoveryPrediction, botUseMartingale, botBaseStake, botMultiplier, botTakeProfit, botStopLoss, botMaxStake, botPL, botStake]);

    const pubWs = useWS(PUBLIC_WS_URL, {
      onOpen: () => { setPubStatus("connected"); pubWs.send({ active_symbols:"brief", product_type:"basic" }); },
      onClose: () => {
        setPubStatus("disconnected");
        setTimeout(() => pubWs.connect(), 2000); // auto-reconnect
      },
      onError: () => setPubStatus("error"),
      onMessage: (msg) => {
        if (msg.error) console.warn("public WS error:", msg);
        if (msg.msg_type === "active_symbols") {
          const syms = (msg.active_symbols||[]).filter(s=>!s.is_trading_suspended);
          setSymbols(syms);
          setSelSym(prev => prev || (syms[0]?.symbol ?? null));
        }
        if (msg.msg_type === "contracts_for") {
          console.log("contracts_for msg:", msg);
          const SUPPORTED = ["CALL","PUT","DIGITEVEN","DIGITODD","DIGITOVER","DIGITUNDER","DIGITMATCH","DIGITDIFF","MULTUP","MULTDOWN","TURBOSLONG","TURBOSSHORT"];
          const list = (msg.contracts_for?.available || []).filter(c => SUPPORTED.includes(c.contract_type));
          setContracts(list);
          setSelCon(prev => prev || (list[0] ?? null));
        }
        if (msg.msg_type === "tick") {
          const { symbol, quote, epoch, pip_size } = msg.tick || {};
          if (symbol && quote) {
            setTicks(prev => ({ ...prev, [symbol]: [...(prev[symbol]||[]), quote].slice(-60) }));
            if (symbol === scanSymRef.current) {
              // pip_size tells us the true decimal precision — JS numbers silently drop trailing zeros,
              // so we must re-pad using pip_size before reading the last digit, or it's misread.
              const decimals = pip_size != null ? pip_size : (String(quote).split(".")[1]?.length || 0);
              const fixedQuote = Number(quote).toFixed(decimals);
              const lastDigit = Number(fixedQuote.slice(-1));
              setScanTicks(prev => [...prev, lastDigit].slice(-scanCountRef.current));
              setScanPrices(prev => [...prev, parseFloat(quote)].slice(-scanCountRef.current));
            }
            if (symbol === chartSymRef.current) {
              const price = parseFloat(quote);
              const t = epoch ? epoch * 1000 : Date.now();
              const intervalMs = chartIntervalRef.current * 1000;
              const bucketStart = Math.floor(t / intervalMs) * intervalMs;
              const cur = currentCandleRef.current;
              if (cur && cur.time === bucketStart) {
                cur.high = Math.max(cur.high, price);
                cur.low  = Math.min(cur.low, price);
                cur.close = price;
                setCandles(prev => {
                  const copy = prev.slice();
                  copy[copy.length - 1] = { ...cur };
                  return copy;
                });
              } else {
                const next = { time: bucketStart, open: price, high: price, low: price, close: price };
                currentCandleRef.current = next;
                setCandles(prev => [...prev, next].slice(-80));
              }
            }
            // Signals candle builder (respects current TF granularity)
            if (symbol === sigSymRef.current) {
              const price = parseFloat(quote);
              const t = epoch ? epoch * 1000 : Date.now();
              const gran = (TF_GRANULARITY[sigTF] || 60) * 1000;
              const bucketStart = Math.floor(t / gran) * gran;
              const key = symbol;
              const prev = sigCandlesRef.current[key] || [];
              const last = prev[prev.length - 1];
              let next;
              if (last && last.time === bucketStart) {
                next = { ...last, high: Math.max(last.high, price), low: Math.min(last.low, price), close: price };
                const updated = [...prev.slice(0, -1), next];
                sigCandlesRef.current[key] = updated;
                setSigCandles(updated.slice(-300));
              } else {
                next = { time: bucketStart, open: price, high: price, low: price, close: price };
                const updated = [...prev, next].slice(-300);
                sigCandlesRef.current[key] = updated;
                setSigCandles(updated);
              }
              setSigLastUpdate(new Date().toLocaleTimeString());
            }
          }
        }
      }
    });

    const heartbeatRef = useRef(null);

    const authWs = useWS(null, {
      onOpen: () => {
        authWs.send({ balance:1, subscribe:1 });
        authWs.send({ portfolio:1 });
        // Send heartbeat every 25s to keep connection alive
        if (heartbeatRef.current) clearInterval(heartbeatRef.current);
        heartbeatRef.current = setInterval(() => {
          authWs.send({ ping:1 });
        }, 25000);
      },
      onClose: () => {
        if (heartbeatRef.current) { clearInterval(heartbeatRef.current); heartbeatRef.current = null; }
        // Stop bot safely if running
        const wasRunning = botRunningRef.current;
        if (wasRunning) {
          setBotRunning(false);
          setBotStatus("idle");
          showToast("Connection lost — reconnecting...", false);
        }
        // Auto-reconnect with fresh OTP after 2 seconds
        setTimeout(() => {
          const token = sessionStorage.getItem("tn_access_token");
          const savedAccount = sessionStorage.getItem("tn_active_account");
          if (token && savedAccount) {
            const acct = JSON.parse(savedAccount);
            fetchOTPViaBackend(acct.account_id, token)
              .then(otp => {
                authWs.connect(otp.ws_url);
                if (wasRunning) showToast("Reconnected ✓ — restart bot to continue", true);
              })
              .catch(() => showToast("Reconnect failed — please log in again", false));
          }
        }, 2000);
      },
      onMessage: (msg) => {
        if (msg.msg_type === "ping") return; // ignore pong responses
        if (msg.msg_type === "balance") {
          // Only accept balance for the currently active account
          const loginid = msg.balance?.loginid;
          const activeId = activeAccount?.loginid || activeAccount?.account_id;
          if (!loginid || !activeId || loginid === activeId) {
            setBalance(msg.balance);
          }
        }
        if (msg.msg_type === "portfolio") { setPortfolio(msg.portfolio?.contracts || []); }

        // ── Bot-originated proposal (req_id 9001) ──
        if (msg.msg_type === "proposal" && msg.req_id === 9001) {
          if (msg.error) {
            showToast("Bot quote failed: " + msg.error.message, false);
            setBotStatus("idle");
          } else {
            authWs.send({ buy: msg.proposal.id, price: parseFloat(msg.proposal.ask_price), req_id: 9002 });
          }
          return;
        }
        // ── Bot-originated buy (req_id 9002) ──
        if (msg.msg_type === "buy" && msg.req_id === 9002) {
          if (msg.error) {
            showToast("Bot trade failed: " + msg.error.message, false);
            setBotStatus("idle");
          } else {
            setBotStatus("in_trade");
            authWs.send({ proposal_open_contract: 1, contract_id: msg.buy.contract_id, subscribe: 1, req_id: 9003 });
          }
          return;
        }
        // ── Bot contract settlement tracking (req_id 9003) ──
        if (msg.msg_type === "proposal_open_contract" && msg.req_id === 9003) {
          const c = msg.proposal_open_contract;
          if (c && c.is_sold) {
            const profit = parseFloat(c.profit);
            const won = profit > 0;
            const st = botStateRef.current;
            const newPL = st.pl + profit;
            setBotPL(newPL);
            setBotTrades(prev => [{ time: Date.now(), stake: st.stake, won, profit, contractId: c.contract_id, prediction: currentPredictionRef.current }, ...prev].slice(0, 50));
            setAuthBalanceRefresh();
            // ── Smart bot execution logic ──────────────────────────────────
            const robot = activeRobot;
            if (robot?.smart) {
              if (robot.id === "novaai") {
                // After trade, reset to scanning for next confluence
                setNovaStatus("scanning");
                setNovaSignal(null);
                novaSignalRef.current = null;
                // Reset stake to base after 5 consecutive losses to protect capital
                if (!won) {
                  const newLosses = smartConsecLossesRef.current + 1;
                  setSmartConsecLosses(newLosses);
                  if (newLosses >= 5) {
                    setBotStake(parseFloat(botBaseStake)||0.35);
                    setSmartConsecLosses(0);
                    showToast("Nova AI: stake reset after 5 losses — protecting capital", false);
                  }
                } else {
                  setSmartConsecLosses(0);
                }
              } else if (robot.id === "smartou") {
                // Smart Over/Under: analyze market and switch sides adaptively after a loss
                const barrier = st.barrier ?? 3;
                if (!won) {
                  // Analyze last 10 digits to find market bias
                  const recent = scanTicks.slice(-10);
                  const overCount  = recent.filter(d => d > barrier).length;
                  const underCount = recent.filter(d => d < barrier).length;
                  // Switch to whichever side has MORE occurrences (mean reversion)
                  // If market has been going OVER a lot, it may revert — trade UNDER
                  // If market has been going UNDER a lot, it may revert — trade OVER
                  let newPred;
                  if (overCount > underCount) {
                    newPred = "under"; // majority over → predict under next
                  } else if (underCount > overCount) {
                    newPred = "over";  // majority under → predict over next
                  } else {
                    // Balanced — flip from current
                    newPred = smartOUPredRef.current === "over" ? "under" : "over";
                  }
                  setSmartOUPred(newPred);
                  smartOUPredRef.current = newPred;
                  setSmartOURecovering(true);
                  smartOURecoveringRef.current = true;
                  showToast(`Smart OU: switched to ${newPred.toUpperCase()} for recovery (${overCount} over / ${underCount} under in last 10)`, true);
                } else {
                  // Won — reset to initial Over prediction, exit recovery mode
                  if (smartOURecoveringRef.current) {
                    setSmartOUPred("over");
                    smartOUPredRef.current = "over";
                    setSmartOURecovering(false);
                    smartOURecoveringRef.current = false;
                  }
                }
              } else if (robot.id === "over0") {
                // Over 0: barrier stays 0, just double on loss reset on win (already handled by Martingale)
                // No extra logic needed — Martingale handles it
              } else if (robot.id === "sniper") {
                // Digit Sniper: re-evaluate hot digit after each trade
                const recent = scanTicks.slice(-15);
                if (recent.length >= 10) {
                  const freq = Array(10).fill(0);
                  recent.forEach(d => freq[d]++);
                  const hotDigit = freq.indexOf(Math.max(...freq));
                  setBotBarrier(hotDigit);
                }
              } else if (robot.id === "switcher") {
                // Even/Odd Switcher: flip after 2 consecutive losses
                if (!won) {
                  const newLosses = smartSwitcherLossesRef.current + 1;
                  setSmartSwitcherLosses(newLosses);
                  if (newLosses >= 2) {
                    const newPred = smartSwitcherPredRef.current === "even" ? "odd" : "even";
                    setSmartSwitcherPred(newPred);
                    setSmartSwitcherLosses(0);
                    setBotPrediction(newPred);
                    currentPredictionRef.current = newPred;
                    showToast(`Switcher: flipping to ${newPred.toUpperCase()} after 2 losses`, true);
                  }
                } else {
                  setSmartSwitcherLosses(0);
                }
              } else if (robot.id === "pausestrike") {
                // Pause & Strike: sit out 2 rounds after 3 consecutive losses
                if (!won) {
                  const newL = smartConsecLossesRef.current + 1;
                  setSmartConsecLosses(newL);
                  if (newL >= 3) {
                    setSmartPauseRounds(2);
                    setSmartConsecLosses(0);
                    showToast("Pause & Strike: sitting out 2 rounds after 3 losses", false);
                  }
                } else {
                  setSmartConsecLosses(0);
                }
                // Pause: skip next rounds
                if (smartPauseRoundsRef.current > 0) {
                  setSmartPauseRounds(r => r - 1);
                  setBotStatus("idle"); // will be checked before next round fires
                  return;
                }
              }
            }
            // ── End smart bot logic ────────────────────────────────────────

            // Martingale: increase stake on loss, reset on win (only if enabled)
            const rawNextStake = won
              ? st.baseStake
              : (st.useMartingale ? +(st.stake * st.multiplier).toFixed(2) : st.baseStake);
            const nextStake = Math.min(rawNextStake, st.maxStake);
            setBotStake(nextStake);
            // Recovery prediction: switch prediction after a loss, revert to initial after a win
            currentPredictionRef.current = won ? st.prediction : st.recoveryPrediction;
            // Helper to save session
            const saveSession = (reason) => {
              const botName = activeRobot?.name || (st.type === "evenodd" ? "Even/Odd" : "Over/Under");
              setSessionHistory(prev => [{
                id: Date.now(), time: new Date().toLocaleString(),
                strategy: botName,
                sym: st.sym, reason,
                trades: botTradesRef.current.length,
                won: botTradesRef.current.filter(t=>t.won).length,
                pl: newPL, baseStake: st.baseStake,
              }, ...prev].slice(0, 200));
            };
            // Check stop conditions
            if (newPL >= st.takeProfit) {
              showToast(`🎯 Take-profit hit! +$${newPL.toFixed(2)}`, true);
              playTakeProfit();
              sendNotif("Take-profit hit! 🎯", `+$${newPL.toFixed(2)} — ${botName} on ${st.sym}`);
              setBotRunning(false); setBotStatus("idle"); saveSession("Take-profit");
            } else if (newPL <= -st.stopLoss) {
              showToast(`🛑 Stop-loss hit. ${newPL.toFixed(2)}`, false);
              playStopLoss();
              sendNotif("Stop-loss hit 🛑", `$${newPL.toFixed(2)} — ${botName} on ${st.sym}`);
              setBotRunning(false); setBotStatus("idle"); saveSession("Stop-loss");
            } else if (!won && rawNextStake > st.maxStake) {
              showToast(`⚠️ Max stake ($${st.maxStake.toFixed(2)}) reached — bot stopped for safety.`, false);
              playStopLoss();
              sendNotif("Max stake reached ⚠️", `Bot stopped safely. P/L: $${newPL.toFixed(2)}`);
              setBotRunning(false); setBotStatus("idle"); saveSession("Max stake");
            } else {
              // Per-trade sounds
              won ? playWin() : playLoss();
              if (botRunningRef.current) setBotStatus("idle");
              else setBotStatus("idle");
            }
          }
          return;
        }

        // ── Speedbot proposal/buy/settlement routing (req_id 9100+/9200+/9300+ per bot index) ──
        if (msg.msg_type === "proposal" && msg.req_id >= 9100 && msg.req_id < 9200) {
          const idx = msg.req_id - 9100;
          if (msg.error) {
            setSpeedbots(prev => prev.map((b,i) => i===idx ? { ...b, running:false, status:"idle" } : b));
            showToast(`Speedbot "${speedbotsRef.current[idx]?.title}" quote failed: `+msg.error.message, false);
          } else {
            authWs.send({ buy: msg.proposal.id, price: parseFloat(msg.proposal.ask_price), req_id: 9200 + idx });
          }
          return;
        }
        if (msg.msg_type === "buy" && msg.req_id >= 9200 && msg.req_id < 9300) {
          const idx = msg.req_id - 9200;
          if (msg.error) {
            setSpeedbots(prev => prev.map((b,i) => i===idx ? { ...b, running:false, status:"idle" } : b));
            showToast(`Speedbot "${speedbotsRef.current[idx]?.title}" trade failed: `+msg.error.message, false);
          } else {
            setSpeedbots(prev => prev.map((b,i) => i===idx ? { ...b, status:"in_trade" } : b));
            authWs.send({ proposal_open_contract: 1, contract_id: msg.buy.contract_id, subscribe: 1, req_id: 9300 + idx });
          }
          return;
        }
        if (msg.msg_type === "proposal_open_contract" && msg.req_id >= 9300 && msg.req_id < 9400) {
          const idx = msg.req_id - 9300;
          const c = msg.proposal_open_contract;
          if (c && c.is_sold) {
            const profit = parseFloat(c.profit);
            setSpeedbots(prev => prev.map((b,i) => {
              if (i !== idx) return b;
              const newPL = b.pl + profit;
              const nextStake = profit > 0 ? parseFloat(b.stake) : +(b.currentStake * parseFloat(b.multiplier)).toFixed(2);
              return { ...b, pl:newPL, currentStake:nextStake, trades:b.trades+1, status:"idle" };
            }));
          }
          return;
        }

        // ── Manual (Trade tab) flows ──
        if (msg.msg_type === "proposal" && (msg.req_id === 7001 || msg.req_id == null))  {
          console.log("proposal msg:", msg);
          if (msg.error) {
            showToast("Quote failed: " + msg.error.message, false);
            setPropLoading(false);
            setBuyLoading(false);
            pendingBuyRef.current = false;
          } else {
            setProposal(msg.proposal); propIdRef.current = msg.proposal?.id; setPropLoading(false);
            if (pendingBuyRef.current) {
              pendingBuyRef.current = false;
              authWs.send({ buy: msg.proposal.id, price: parseFloat(msg.proposal.ask_price), req_id: 7002 });
            }
          }
        }
        if (msg.msg_type === "buy" && (msg.req_id === 7002 || msg.req_id == null)) { setBuyResult(msg.buy); setBuyLoading(false); showToast(msg.error ? "Buy failed: "+msg.error.message : "✓ Contract #"+msg.buy?.contract_id+" purchased", !msg.error); authWs.send({portfolio:1}); }

        if (msg.error && msg.msg_type !== "buy" && msg.msg_type !== "proposal" && msg.msg_type !== "proposal_open_contract") { showToast("Error: "+msg.error.message, false); setPropLoading(false); setBuyLoading(false); }
      }
    });

    function setAuthBalanceRefresh() { authWs.send({ portfolio: 1 }); }

    // Speedbot trigger evaluator
    function evalSpeedbot(bot, digits, prices) {
      const w = bot.ticksWindow || 5;
      const recent = digits.slice(-w);
      const recentP = prices.slice(-w);
      let leftPct = 0, rightPct = 0;
      const total = Math.max(1, recent.length);

      if (bot.stat === "evenodd") {
        const even = recent.filter(d => d % 2 === 0).length;
        leftPct  = +((even / total) * 100).toFixed(1);
        rightPct = +(((total - even) / total) * 100).toFixed(1);
      } else if (bot.stat === "overunder") {
        const over = recent.filter(d => d > (bot.barrier ?? 4)).length;
        leftPct  = +((over / total) * 100).toFixed(1);
        rightPct = +(((total - over) / total) * 100).toFixed(1);
      } else if (bot.stat === "risefall") {
        let rises = 0, falls = 0;
        for (let i = 1; i < recentP.length; i++) {
          if (recentP[i] > recentP[i-1]) rises++;
          else if (recentP[i] < recentP[i-1]) falls++;
        }
        const mv = Math.max(1, rises + falls);
        leftPct  = +((rises / mv) * 100).toFixed(1);
        rightPct = +((falls / mv) * 100).toFixed(1);
      }

      const thr = bot.threshold || 60;
      let signal = null;
      if      (leftPct  >= thr) signal = bot.stat === "evenodd" ? "even"  : bot.stat === "risefall" ? "rise"  : "over";
      else if (rightPct >= thr) signal = bot.stat === "evenodd" ? "odd"   : bot.stat === "risefall" ? "fall"  : "under";
      return { signal, leftPct, rightPct };
    }

    // Speedbot round trigger
    useEffect(() => {
      speedbots.forEach((bot, idx) => {
        if (!bot.running || bot.status !== "idle") return;
        if (!bot.sym) return;
        const digits = scanSym === bot.sym ? scanTicks : [];
        const prices = scanSym === bot.sym ? scanPrices : [];
        if (digits.length < (bot.ticksWindow || 5)) return; // need enough data
        const { signal } = evalSpeedbot(bot, digits, prices);
        if (!signal) return; // no trigger — wait for next tick
        const ctMap = { even:"DIGITEVEN", odd:"DIGITODD", over:"DIGITOVER", under:"DIGITUNDER", rise:"CALL", fall:"PUT" };
        const contract_type = ctMap[signal];
        if (!contract_type) return;
        const req = {
          proposal: 1, amount: bot.currentStake, basis: "stake",
          contract_type, currency: "USD", duration: 1, duration_unit: "t",
          underlying_symbol: bot.sym, req_id: 9100 + idx,
        };
        if (bot.stat === "overunder") req.barrier = String(bot.barrier ?? 4);
        setSpeedbots(prev => prev.map((b,i) => i===idx ? { ...b, status:"waiting" } : b));
        authWs.send(req);
      });
    }, [speedbots, scanTicks, scanPrices]);

    // Bot round trigger — fires next trade when idle & running
    useEffect(() => {
      if (!botRunning || botStatus !== "idle") return;
      // Small delay to ensure botStateRef is synced after state updates
      const delay = setTimeout(() => {
      const st = botStateRef.current;
      if (!st.sym) { showToast("Bot: select a market first", false); setBotRunning(false); return; }
      // Pause & Strike: skip rounds if paused
      if (activeRobot?.id === "pausestrike" && smartPauseRoundsRef.current > 0) {
        setSmartPauseRounds(r => Math.max(0, r - 1));
        setTimeout(() => setBotStatus("idle"), 2000); // wait 2s then retry
        return;
      }
      const activePrediction = currentPredictionRef.current;

      // ── Nova AI: evaluate confluence before trading ──────────────────────
      if (activeRobot?.id === "novaai") {
        // Use refs to get current values (avoids stale closure bug)
        const currentScanTicks = scanTicksRef.current;
        const currentTicks = ticksRef.current;
        let digits = currentScanTicks.length >= 10 ? currentScanTicks : [];
        if (digits.length < 10 && st.sym && currentTicks[st.sym]?.length >= 10) {
          digits = currentTicks[st.sym].map(q => {
            return Number(Number(q).toFixed(4).replace(".","").slice(-1));
          });
        }
        console.log("Nova AI evaluating with", digits.length, "digits:", digits.slice(-10));
        const signal = evaluateNovaSignal(digits, scanPrices);
        setNovaSignal(signal);
        if (!signal) {
          setNovaStatus("scanning");
          setNovaSkipped(s => s + 1);
          setTimeout(() => {
            if (botRunningRef.current) setBotTick(t => t + 1);
          }, 800);
          return;
        }
        setNovaStatus("confirmed");
        currentPredictionRef.current = signal.prediction;
      }

      // Determine contract type — handle special smart bot types
      let contract_type;
      let overrideSym = null;   // Nova Rotator switches markets per step
      let overrideBarrier = null;
      if (activeRobot?.id === "novarot") {
        const currentDigits = scanTicksRef.current.length >= 5 ? scanTicksRef.current :
          (ticksRef.current[st.sym]||[]).map(q=>Number(Number(q).toFixed(4).replace(".","").slice(-1)));
        const lastTrade = botTradesRef.current[0];
        if (lastTrade && !lastTrade.won) {
          // Lost (in sequence OR in recovery) — stay in Even/Odd recovery until a win
          const rec = evaluateRotatorRecovery(currentDigits);
          contract_type = rec.contract_type;
          setRotRecovering(true);
          rotRecoveringRef.current = true;
          setNovaSignal({ prediction:rec.prediction, confidence:50, isRecovery:true, label:rec.label,
            signals:[{ name:"⚡ RECOVERY", value:rec.label, prediction:rec.prediction, active:true, strength:50 }], votes:1 });
        } else {
          // Won or first trade — resume/continue sequence
          if (rotRecoveringRef.current) { setRotRecovering(false); rotRecoveringRef.current = false; }
          const stepInfo = evaluateRotatorStep(rotStepRef.current, st.sym, rotMarketBRef.current, currentDigits);
          contract_type = stepInfo.contract_type;
          overrideSym = stepInfo.sym;
          overrideBarrier = stepInfo.barrier;
          setNovaSignal({ prediction:"sequence", confidence:70, isRecovery:false, label:stepInfo.label,
            signals:[{ name:`STEP ${(rotStepRef.current % 5)+1}/5`, value:stepInfo.label, prediction:"over", active:true, strength:70 }], votes:1 });
          setRotStep(s => s + 1);
        }
        setNovaStatus("confirmed");
      } else if (activeRobot?.id === "over0") {
        contract_type = "DIGITDIFF";
      } else if (activeRobot?.id === "sniper") {
        contract_type = "DIGITDIFF";
      } else if (activeRobot?.id === "novaou") {
        const currentDigits = scanTicksRef.current.length >= 5 ? scanTicksRef.current :
          (ticksRef.current[st.sym]||[]).map(q=>Number(Number(q).toFixed(4).replace(".","").slice(-1)));
        const lastTrade = botTradesRef.current[0];
        const tradeCount = botTradesRef.current.length;
        const ouSig = evaluateNovaOUSignal(currentDigits, lastTrade?.won ?? null, tradeCount);
        contract_type = ouSig.contract_type;
        botStateRef.current = { ...botStateRef.current, barrier: ouSig.barrier };
        setBotBarrier(ouSig.barrier);
        setNovaSignal({
          prediction: ouSig.contract_type === "DIGITUNDER" ? "under" : "over",
          confidence: ouSig.confidence,
          isRecovery: ouSig.isRecovery,
          label: ouSig.label,
          signals:[
            { name: ouSig.isRecovery ? "⚡ RECOVERY MODE" : "◎ NORMAL MODE",
              value: ouSig.label, prediction:"over", active:true, strength:ouSig.confidence },
          ], votes:1
        });
        setNovaStatus("confirmed");
      } else if (activeRobot?.id === "novarf") {
        const currentPrices = scanPricesRef.current?.length >= 5 ? scanPricesRef.current :
          (ticksRef.current[st.sym]||[]).map(q=>parseFloat(q));
        const rfSig = evaluateNovaRFSignal(currentPrices);
        if (!rfSig) {
          setNovaStatus("scanning"); setNovaSkipped(s=>s+1);
          setTimeout(()=>{ if(botRunningRef.current) setBotTick(t=>t+1); }, 800);
          return;
        }
        contract_type = rfSig.prediction==="rise"?"CALL":"PUT";
        setNovaSignal({ ...rfSig, signals:[
          { name:"Price Momentum", value:rfSig.streak+"x "+rfSig.direction, prediction:rfSig.prediction, active:true, strength:rfSig.confidence },
          { name:"Momentum Score", value:rfSig.confidence+"%", prediction:rfSig.prediction, active:true, strength:rfSig.confidence },
        ], votes:2 });
        setNovaStatus("confirmed");
      } else if (activeRobot?.id === "smartou") {
        const pred = smartOUPredRef.current;
        contract_type = pred === "over" ? "DIGITOVER" : "DIGITUNDER";
      } else {
        contract_type = st.type === "evenodd"
          ? (activePrediction === "even" ? "DIGITEVEN" : "DIGITODD")
          : (activePrediction === "over" ? "DIGITOVER" : "DIGITUNDER");
      }
      const req = {
        proposal: 1, amount: st.stake, basis: "stake",
        contract_type, currency: "USD", duration: 1, duration_unit: "t",
        underlying_symbol: overrideSym || st.sym, req_id: 9001,
      };

    // Sequence: 0=DIFFER@A, 1=OVER1@B, 2=OVER2@B, 3=DIFFER@B, 4=UNDER8@A → repeat
    function evaluateRotatorStep(step, marketA, marketB, digits) {
      const hotDigit = (() => {
        const recent = digits.slice(-15);
        if (recent.length < 5) return 5;
        const freq = Array(10).fill(0);
        recent.forEach(d => freq[d]++);
        return freq.indexOf(Math.max(...freq));
      })();
      const seq = [
        { contract_type:"DIGITDIFF",  barrier:hotDigit, sym:marketA, label:`DIFFER ${hotDigit} @ Market A` },
        { contract_type:"DIGITOVER",  barrier:1,        sym:marketB, label:"OVER 1 @ Market B" },
        { contract_type:"DIGITOVER",  barrier:2,        sym:marketB, label:"OVER 2 @ Market B" },
        { contract_type:"DIGITDIFF",  barrier:hotDigit, sym:marketB, label:`DIFFER ${hotDigit} @ Market B` },
        { contract_type:"DIGITUNDER", barrier:8,        sym:marketA, label:"UNDER 8 @ Market A" },
      ];
      return seq[step % seq.length];
    }

    // Recovery: Even/Odd based on last 10 digits majority (trade the opposite)
    function evaluateRotatorRecovery(digits) {
      const recent = digits.slice(-10);
      const evenCount = recent.filter(d=>d%2===0).length;
      const prediction = evenCount >= 5 ? "odd" : "even"; // majority even → bet odd
      return {
        contract_type: prediction === "even" ? "DIGITEVEN" : "DIGITODD",
        label: `RECOVERY: ${prediction.toUpperCase()} (${evenCount}/10 even)`,
        prediction,
      };
    }

    // ── Nova OU Signal Engine ─────────────────────────────────────────────────
    // Returns: { barrier, contract_type, confidence, isRecovery }
    function evaluateNovaOUSignal(digits, lastWon, tradeCount) {
      const inRecovery = lastWon === false;

      if (inRecovery) {
        // After a loss: use Over 5 or Under 4 (pick based on recent digits)
        const recent5 = digits.slice(-5);
        const avgDigit = recent5.length ? recent5.reduce((a,b)=>a+b,0)/recent5.length : 5;
        if (avgDigit > 5) {
          // Recent digits high → predict Under 4
          return { barrier:4, contract_type:"DIGITUNDER", confidence:50, isRecovery:true, label:"RECOVERY: UNDER 4" };
        } else {
          // Recent digits low → predict Over 5
          return { barrier:5, contract_type:"DIGITOVER", confidence:50, isRecovery:true, label:"RECOVERY: OVER 5" };
        }
      }

      // Normal mode: alternate between Over 3 and Over 4
      const useOver4 = (tradeCount % 2 === 0);
      const barrier = useOver4 ? 4 : 3;
      const confidence = useOver4 ? 60 : 70; // Over 3 = ~70%, Over 4 = ~60%
      return { barrier, contract_type:"DIGITOVER", confidence, isRecovery:false, label:`NORMAL: OVER ${barrier}` };
    }

    // ── Nova RF Signal Engine ─────────────────────────────────────────────────
    // Returns: { prediction, confidence, streak } or null if no signal
    function evaluateNovaRFSignal(prices) {
      if (prices.length < 5) return null;
      const recent = prices.slice(-6);
      // Build direction array: 1=rise, -1=fall, 0=flat
      const dirs = recent.slice(1).map((p,i) => p > recent[i] ? 1 : p < recent[i] ? -1 : 0);
      // Count consecutive same direction from end
      const lastDir = dirs[dirs.length-1];
      if (lastDir === 0) return null;
      let streak = 0;
      for (let i = dirs.length-1; i >= 0; i--) {
        if (dirs[i] === lastDir) streak++;
        else break;
      }
      if (streak < 2) return null; // need 2+ consecutive moves
      // Counter-trend: after 3+ same direction, expect reversal
      // With-trend: after 2 same direction, ride momentum
      let prediction, confidence;
      if (streak >= 4) {
        // Strong trend — counter-trade (reversal likely)
        prediction = lastDir === 1 ? "fall" : "rise";
        confidence = Math.min(55 + streak*3, 75);
      } else {
        // 2-3 streak — ride momentum
        prediction = lastDir === 1 ? "rise" : "fall";
        confidence = 50 + streak*8;
      }
      // Also check rise/fall % from scanner for confirmation
      if (prices.length >= 10) {
        const last10 = prices.slice(-10);
        const rises = last10.filter((p,i) => i>0 && p>last10[i-1]).length;
        const fallPct = ((last10.length-1-rises)/(last10.length-1))*100;
        const risePct = (rises/(last10.length-1))*100;
        // If scanner agrees with prediction, boost confidence
        if (prediction==="rise" && risePct>55) confidence = Math.min(confidence+10, 85);
        if (prediction==="fall" && fallPct>55) confidence = Math.min(confidence+10, 85);
      }
      return { prediction, confidence, streak, direction: lastDir===1?"↑":"↓" };
    }

    function evaluateNovaSignal(digits, prices) {
      if (digits.length < 5) return null;

      const recent10 = digits.slice(-10);
      const recent5  = digits.slice(-5);

      // Signal 1: last 10 even/odd balance
      const evenCount = recent10.filter(d=>d%2===0).length;
      const oddCount  = recent10.length - evenCount;
      const s1pred = evenCount >= oddCount ? "odd" : "even";

      // Signal 2: last 5 streak
      const lastType = recent5[recent5.length-1]%2===0 ? "even" : "odd";
      let streak = 0;
      for (let i=recent5.length-1;i>=0;i--) {
        if ((recent5[i]%2===0?"even":"odd")===lastType) streak++;
        else break;
      }
      const s2pred = streak >= 2 ? (lastType==="even"?"odd":"even") : s1pred;

      // Signal 3: simple majority of last 5
      const e5 = recent5.filter(d=>d%2===0).length;
      const s3pred = e5 >= 3 ? "odd" : "even";

      // Always trade — just pick the majority vote
      const evenVotes = [s1pred,s2pred,s3pred].filter(v=>v==="even").length;
      const oddVotes  = 3 - evenVotes;
      const prediction = evenVotes >= oddVotes ? "even" : "odd";
      const confidence = Math.round(50 + Math.abs(evenVotes-oddVotes)*15 + streak*5);

      return {
        prediction,
        confidence: Math.min(confidence, 99),
        signals: [
          { name:"10-tick Balance",  value:evenCount+"/"+oddCount, prediction:s1pred, active:true, strength:Math.abs(evenCount-oddCount)*10 },

        ],
        votes: Math.max(evenVotes, oddVotes),
      };
    }

    // Evaluate a tile's trigger: returns { signal: "even"|"odd"|"over"|"under"|"rise"|"fall"|"match"|"differ"|null, leftPct, rightPct }
    function evalTileTrigger(tile, digits, prices) {
      const w = tile.window;
      const recent = digits.slice(-w);
      const recentP = prices.slice(-w);
      let leftCount = 0, rightCount = 0, total = recent.length || 1;

      if (tile.stat === "evenodd") {
        leftCount  = recent.filter(d => d % 2 === 0).length;
        rightCount = recent.filter(d => d % 2 !== 0).length;
      } else if (tile.stat === "overunder") {
        leftCount  = recent.filter(d => d > (tile.barrier ?? 4)).length;
        rightCount = recent.filter(d => d < (tile.barrier ?? 4)).length;
      } else if (tile.stat === "risefall") {
        for (let i = 1; i < recentP.length; i++) {
          if (recentP[i] > recentP[i-1]) leftCount++;
          else if (recentP[i] < recentP[i-1]) rightCount++;
        }
        total = Math.max(1, leftCount + rightCount);
      } else if (tile.stat === "matchdiffer") {
        leftCount  = recent.filter(d => d === scanMatchDigit).length;
        rightCount = recent.filter(d => d !== scanMatchDigit).length;
      }

      const leftPct  = +((leftCount  / total) * 100).toFixed(1);
      const rightPct = +((rightCount / total) * 100).toFixed(1);
      const thr = tile.threshold;
      let signal = null;
      if (leftPct  >= thr) signal = tile.tradeWhenOver;
      else if (rightPct >= thr) signal = tile.tradeWhenUnder;

      return { signal, leftPct, rightPct };
    }

        setPortfolio([]);
        const otp = await fetchOTPViaBackend(account.account_id, accessTokenRef.current);
        setActiveAccount(account);
        try { sessionStorage.setItem("tn_active_account", JSON.stringify(account)); } catch {}
        authWs.connect(otp.ws_url);
      } catch(err) {
        showToast("Failed to switch account: "+err.message, false);
      } finally {
        setSwitchingAccount(false);
      }
    }

    function confirmStartBot() {
      setBotConfirming(false);
      // Safety caps for smart bots — prevent dangerous stake escalation
      let baseStake = parseFloat(botBaseStake) || 1;
      let maxStakeCap = parseFloat(botMaxStake) || 20;
      if (activeRobot?.smart) {
        if (baseStake > 1) {
          baseStake = 1;
          setBotBaseStake("1");
          showToast("Smart bot: base stake capped at $1 for safety", false);
        }
        if (maxStakeCap > 20) {
          maxStakeCap = 20;
          setBotMaxStake("20");
        }
      }
      setBotPL(0);
      setBotStake(baseStake);
      setBotTrades([]);
      setBotStatus("idle");
      currentPredictionRef.current = botPrediction;
      // Directly sync botStateRef so the round trigger has correct values immediately
      botStateRef.current = {
        sym: botSym, type: botType, prediction: botPrediction, barrier: botBarrier,
        recoveryPrediction: botRecoveryPrediction, useMartingale: botUseMartingale,
        baseStake, multiplier: parseFloat(botMultiplier) || 2,
        takeProfit: parseFloat(botTakeProfit) || 10, stopLoss: parseFloat(botStopLoss) || 10,
        maxStake: maxStakeCap,
        pl: 0, stake: baseStake,
      };
      // Reset smart bot state
      setSmartConsecLosses(0);
      setSmartPauseRounds(0);
      setSmartSwitcherPred(botPrediction);
      setSmartSwitcherLosses(0);
      setSmartOUPred("over");
      setSmartOURecovering(false);
      smartOUPredRef.current = "over";
      smartOURecoveringRef.current = false;
      // Reset Nova AI
      setNovaSignal(null);
      setNovaStatus("scanning");
      setNovaSkipped(0);
      novaSignalRef.current = null;
      // Reset Nova Rotator + subscribe to secondary market
      if (activeRobot?.id === "novarot") {
        setRotStep(0); rotStepRef.current = 0;

        if (pubStatus === "connected" && rotMarketBRef.current) {
          pubWs.send({ ticks: rotMarketBRef.current, subscribe: 1 });
        }
      }
      // Auto-start scanner for Nova AI
      if (activeRobot?.id === "novaai" && botSym) {
        startScan(botSym);
      }
      smartConsecLossesRef.current = 0;
      smartPauseRoundsRef.current = 0;
      smartSwitcherPredRef.current = botPrediction;
      smartSwitcherLossesRef.current = 0;
      // Digit Sniper: set initial hot digit from scanner

        const freq = Array(10).fill(0);
        scanTicks.slice(-15).forEach(d => freq[d]++);

      setBotRunning(true);
      playStart();

            for (let i = period; i < data.length; i++) val = data[i] * k + val * (1 - k);

            for (let i=1;i<slice.length;i++) {
              const d = slice[i]-slice[i-1];
              if (d>0) gains+=d; else losses-=d;

            if (losses===0) return 100;

            const mean = tp.reduce((a,b)=>a+b,0)/period;

              const s = testFn(arr[i], i, arr);
              if (s == null) continue;
              if (side === null) { side = s; streak = 1; }
              else if (s === side) streak++;
              else break;
            }
            return { streak, side };
          };
          const ouStreak = streakOf(scanTicks, d => d === 5 ? null : (d > 5 ? "Over" : "Under"));
          const mdStreak = streakOf(scanTicks, d => d === scanMatchDigit ? "Match" : "Differ");
          const eoStreak = streakOf(scanTicks, d => d % 2 === 0 ? "Even" : "Odd");
          const rfStreak = streakOf(scanPrices, (p,i,arr) => i === 0 ? null : (p > arr[i-1] ? "Rise" : p < arr[i-1] ? "Fall" : null));

                  width:22,height:22,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",

          );

          return e("div", { style:{padding:32,maxWidth:1000} },
            e("h2", { style:{fontSize:22,fontWeight:700,margin:"0 0 24px",letterSpacing:-0.5} }, "Signal Scanner"),

              e("div", { style:{flex:1,minWidth:200} },

              scanSym && e("div", { style:{marginLeft:"auto",textAlign:"right"} },
                e("div", { style:{fontSize:10,color:C.muted,letterSpacing:1} }, "LIVE PRICE"),
                e("div", { style:{fontSize:18,fontFamily:"monospace",fontWeight:700,color:C.cyan} }, scanPrices.length ? scanPrices[scanPrices.length-1].toFixed(4) : "—")
              )

              ? e("div", { style:{background:C.card,border:`1px dashed ${C.border}`,borderRadius:12,padding:48,textAlign:"center"} },

                  ),

                  // Digit circles — single row, bigger, with live "last digit" pointer
                  e("div", { style:{position:"relative",marginBottom:28} },
                    e("div", { style:{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:8} },
                      counts.map((c,d) => {
                        const p = pct(c);
                        const maxC = Math.max(...counts);
                        const hot = total > 0 && c === maxC;
                        const cold = total > 0 && c === Math.min(...counts);
                        const isMatchTarget = d === scanMatchDigit;
                        const borderColor = hot ? C.red : cold ? C.cyan : (isMatchTarget ? "#a78bfa" : C.border);
                        return e("div", { key:d, onClick:()=>setScanMatchDigit(d), title:"Set as Match/Differ target", style:{

                      })

              e("div", { style:{display:"flex",gap:6,flexWrap:"wrap"} },
                p.tags.map(t => e("span", { key:t, style:{background:C.raised,border:`1px solid ${C.border}`,borderRadius:6,padding:"3px 8px",fontSize:11,color:C.sub} }, t))
              ),

                e("div", null,
                  e("div", { style:{fontSize:10,color:C.muted,letterSpacing:0.5} }, "TRADE SETUP"),

              )
            ))
          )

            e("h2", { style:{fontSize:22,fontWeight:700,margin:"0 0 8px",letterSpacing:-0.5} }, "Auto Trader"),

            e("div", { style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16} },
              speedbots.map((bot, idx) => {
                const digits = scanSym === bot.sym ? scanTicks : [];
                const prices = scanSym === bot.sym ? scanPrices : [];
                const { signal, leftPct, rightPct } = evalSpeedbot(bot, digits, prices);
                const [leftLabel, rightLabel] = STAT_LABELS[bot.stat] || ["A","B"];
                const statusColor = bot.running

                  // Header
                  e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"} },
                    e("div", null,
                      e("div", { style:{fontSize:14,fontWeight:700,color:C.text} }, bot.title),
                      e("div", { style:{display:"flex",alignItems:"center",gap:5,marginTop:3} },
                        e("span", { style:{width:6,height:6,borderRadius:"50%",background:statusColor,display:"inline-block"} }),
                        e("span", { style:{fontSize:10,color:statusColor,letterSpacing:1} }, statusText)
                      )
                    ),
                    e("div", { style:{fontFamily:"monospace",fontSize:13,fontWeight:700,color:C.cyan} },
                      bot.sym && ticks[bot.sym]?.length ? Number(ticks[bot.sym][ticks[bot.sym].length-1]).toFixed(2) : "—"
                    )
                  ),

                  // Live digit strip
                  e("div", { style:{display:"flex",gap:4,flexWrap:"wrap",minHeight:28} },
                    digits.slice(-10).map((d,i,arr) => e("span", { key:i, style:{
                      width:24,height:24,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",

          let leftLabel, rightLabel, leftDesc, rightDesc, leftPct, rightPct, leftTriggered, rightTriggered, leftColor, rightColor;
          if (isDiffer0) {

            leftPct = ((differCount/trgTotal)*100).toFixed(0); rightPct = ((matchCount/trgTotal)*100).toFixed(0);
            leftTriggered = recentForTrigger.length > 0 && recentForTrigger[recentForTrigger.length-1] !== 0;
            rightTriggered = recentForTrigger.length > 0 && recentForTrigger[recentForTrigger.length-1] === 0;
            leftColor = C.green; rightColor = C.red;
          } else if (isOU) {
            const overCount = recentForTrigger.filter(d => d > activeRobot.barrier).length;
            const underBarrier = 9 - activeRobot.barrier;

            leftLabel = "Over "+activeRobot.barrier; rightLabel = "Under "+underBarrier;
            leftDesc = "If last digit > "+activeRobot.barrier; rightDesc = "If last digit < "+underBarrier;

            rightTriggered = recentForTrigger.length > 0 && recentForTrigger[recentForTrigger.length-1] < underBarrier;
            leftColor = C.green; rightColor = "#fb923c";

            const evenCount = recentForTrigger.filter(d => d % 2 === 0).length;
            const oddCount = recentForTrigger.filter(d => d % 2 !== 0).length;

                      borderRadius:8, padding:"10px 14px",

              )
            : portfolio.length === 0
              ? e("div", { style:{textAlign:"center",padding:"80px 20px",color:C.muted} },
                  e("div", { style:{fontSize:48} }, "▤"),
                  e("p", { style:{marginTop:16} }, "No open contracts. Place a trade to get started.")
                )
              : e("div", { style:{border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"} },
                  e("div", { style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"12px 20px",background:C.raised,fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`} },
                    ["Asset","Type","Buy Price","Payout","Expiry"].map(h=>e("span",{key:h},h))
                  ),
                  portfolio.map(c =>
                    e("div", { key:c.contract_id, style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"14px 20px",fontSize:13,color:C.sub,borderBottom:`1px solid #0f172a`,alignItems:"center"} },
                      e("span", { style:{color:C.text,fontWeight:600} }, c.underlying_symbol||c.symbol),
                      e("span", null, c.contract_type),
                      e("span", { style:{fontFamily:"monospace"} }, "$"+fmtMoney(c.buy_price)),
                      e("span", { style:{color:C.green,fontFamily:"monospace"} }, "$"+fmtMoney(c.payout)),
                      e("span", { style:{fontSize:12} }, c.expiry_time ? new Date(c.expiry_time*1000).toLocaleTimeString() : "—")
                    )
                  )
                )
        )
      )
    ), // closes body wrapper (aside + main)

      toast && e("div", { style:{position:"fixed",bottom:24,right:24,padding:"14px 20px",borderRadius:10,border:"1px solid",fontSize:13,fontWeight:600,maxWidth:360,zIndex:1000,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",background:toast.ok?"#052e16":"#1f0a0a",borderColor:toast.ok?C.green:C.red,color:toast.ok?C.green:C.red} }, toast.msg),

      // ── Real money account switch warning ──
      realWarningPending && e("div", { style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000} },
        e("div", { style:{background:"#1c0a0a",border:"2px solid #f87171",borderRadius:14,padding:28,maxWidth:400} },
          e("div", { style:{fontSize:28,marginBottom:12,textAlign:"center"} }, "⚠️"),
          e("h3", { style:{fontSize:17,fontWeight:700,marginBottom:10,color:"#fca5a5",textAlign:"center"} }, "Switch to Real Money?"),
          e("p", { style:{color:"#fca5a5",fontSize:13,lineHeight:1.7,marginBottom:8} }, "You are about to switch to your REAL money account."),
          e("p", { style:{color:C.red,fontSize:13,lineHeight:1.7,marginBottom:20,fontWeight:600} }, "All bot trades, manual trades, and automated strategies will use REAL funds. Losses are permanent and cannot be reversed."),
          e("div", { style:{display:"flex",gap:10} },
            e("button", { style:{flex:1,padding:"11px",borderRadius:8,border:"1px solid #475569",background:"transparent",color:C.sub,fontSize:13,fontWeight:600,cursor:"pointer"}, onClick:()=>setRealWarningPending(null) }, "Cancel — stay on Demo"),
            e("button", { style:{flex:1,padding:"11px",borderRadius:8,border:"none",background:C.red,color:"#1f0a0a",fontSize:13,fontWeight:700,cursor:"pointer"}, onClick:()=>doSwitchAccount(realWarningPending) }, "I understand — switch to Real")
          )
        )
      ),

      // ── Bot start confirmation modal (top-level so it works from Bulk Trader or any AI Robot run screen) ──
      botConfirming && e("div", { style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000} },
        e("div", { style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:28,maxWidth:420} },
          e("h3", { style:{fontSize:17,fontWeight:700,marginBottom:12} }, "Confirm Bot Start"),
          // Safety warning for Martingale bots
          parseFloat(botBaseStake) > 5 && e("div", { style:{background:"#1c0a0a",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#fca5a5"} },
            "⚠️ Your base stake is $"+botBaseStake+". With Martingale ×"+botMultiplier+", a 5-loss streak would require $"+(parseFloat(botBaseStake)*Math.pow(parseFloat(botMultiplier)||2,5)).toFixed(2)+" stake. Consider starting with $0.35–$1."
          ),
          e("div", { style:{background:C.raised,borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8} },
            e("div", null, e("span",{style:{color:C.muted}},"Base stake: "), e("strong",{style:{color:C.green}},"$"+botBaseStake)),
            e("div", null, e("span",{style:{color:C.muted}},"Martingale: "), e("strong",{style:{color:C.text}},"×"+botMultiplier)),
            e("div", null, e("span",{style:{color:C.muted}},"Take profit: "), e("strong",{style:{color:C.green}},"+$"+botTakeProfit)),
            e("div", null, e("span",{style:{color:C.muted}},"Stop loss: "), e("strong",{style:{color:C.red}},"-$"+botStopLoss)),
            e("div", null, e("span",{style:{color:C.muted}},"Max stake cap: "), e("strong",{style:{color:C.amber}},"$"+botMaxStake)),
          ),
          e("div", { style:{display:"flex",gap:10} },
            e("button", { style:{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.sub,fontSize:13,fontWeight:600,cursor:"pointer"}, onClick:()=>setBotConfirming(false) }, "Cancel"),
            e("button", { style:{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.green,color:"#052e16",fontSize:13,fontWeight:700,cursor:"pointer"}, onClick:confirmStartBot }, "Start Bot")
          )
        )
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
